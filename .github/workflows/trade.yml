name: TJR Bot (paper)

# Runs on GitHub's free runners. Times are UTC, tuned for US Eastern DAYLIGHT
# time (EDT = UTC-4). In winter (EST) shift the windows +1 hour (see DEPLOY.md).
on:
  # Scheduling is handled by cron-job.org (a reliable external timer) which calls
  # the workflow_dispatch API below on a cron, in America/New_York time:
  #   - every 5 min          -> mode=once     (scan; the bot self-filters to market hours)
  #   - 4:05 PM ET, Mon-Fri  -> mode=summary  (daily recap)
  #   - 4:10 PM ET, Fridays  -> mode=weekly   (weekly recap)
  # GitHub's built-in schedule was removed because it dropped/delayed runs.
  workflow_dispatch:
    inputs:
      mode:
        description: "once | summary | weekly | healthcheck | strategy-report | review | morning-brief"
        default: "healthcheck"
        type: string

concurrency:
  group: tjr-bot
  cancel-in-progress: false        # never interrupt a run mid-order

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write          # review mode commits auto-tuned config.yaml back
    env:
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
      ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Daily summary
        if: ${{ github.event.schedule == '5 20 * * 1-5' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'summary') }}
        run: python scripts/run_bot.py --summary

      - name: Weekly recap
        if: ${{ github.event.schedule == '10 20 * * 5' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'weekly') }}
        run: python scripts/run_bot.py --weekly

      - name: Connectivity self-test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'healthcheck' }}
        run: python scripts/healthcheck.py

      - name: Strategy performance report
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'strategy-report' }}
        run: python scripts/strategy_report.py --telegram

      # Pre-open news digest (add a cron-job.org entry ~9:00 AM ET, Mon-Fri).
      - name: Morning news brief
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'morning-brief' }}
        run: python scripts/morning_brief.py --telegram

      # Nightly self-improvement: analyse the day's trades, adjust strategy config
      # within guardrails (never risk rails, paper-only), run tests, and COMMIT the
      # change back so the next day's runs pick it up. Pushes a summary to Telegram.
      - name: Autonomous strategy review (apply + commit)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'review' }}
        env:
          # Only learn from trades on/after the last strategy-code change (2026-07-09:
          # capped marketable-limit entries + news gate; before that the 07-08
          # APEX/RIPTIDE launch), so stale losses from the old execution can't
          # auto-disable a now-corrected strategy.
          EVAL_SINCE: "2026-07-09"
        run: |
          set -e
          cp config.yaml /tmp/config.before.yaml
          python scripts/review_bot.py --apply --telegram --days 14
          # Verify the bot still imports + tests pass before committing any change.
          python -m pytest tests/ -q
          if ! diff -q /tmp/config.before.yaml config.yaml >/dev/null 2>&1; then
            git config user.name "tjr-bot[bot]"
            git config user.email "tjr-bot@users.noreply.github.com"
            git add config.yaml
            git commit -m "chore(review): auto-tune strategy config [skip ci]"
            git push
            echo "config.yaml updated and committed."
          else
            echo "No config change to commit."
          fi

      - name: Trading cycle
        if: ${{ (github.event_name == 'schedule' && github.event.schedule != '5 20 * * 1-5' && github.event.schedule != '10 20 * * 5') || (github.event_name == 'workflow_dispatch' && inputs.mode == 'once') }}
        run: python scripts/run_bot.py --once
