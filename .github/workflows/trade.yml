name: TJR Bot (paper)

# Runs the bot on a schedule (GitHub's free runners). Times are UTC.
# Current schedule is tuned for US Eastern DAYLIGHT time (EDT, summer = UTC-4).
# In winter (EST = UTC-5), shift both windows +1 hour (see DEPLOY.md).
on:
  schedule:
    - cron: "*/5 13-15 * * 1-5"   # ~09:00-11:55 ET: hunt for setups during the NY open
    - cron: "*/5 19-20 * * 1-5"   # ~15:00-16:55 ET: reconcile results + end-of-day flatten
  workflow_dispatch:
    inputs:
      healthcheck:
        description: "Run a connectivity self-test (pings your phone)"
        default: "true"
        type: string

concurrency:
  group: tjr-bot
  cancel-in-progress: false        # never interrupt a run mid-order

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
      ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Connectivity self-test (manual runs only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.healthcheck == 'true' }}
        run: python scripts/healthcheck.py
      - name: Run one trading cycle
        run: python scripts/run_bot.py --once
