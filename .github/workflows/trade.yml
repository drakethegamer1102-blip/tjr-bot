name: TJR Bot (paper)

# Runs on GitHub's free runners. Times are UTC, tuned for US Eastern DAYLIGHT
# time (EDT = UTC-4). In winter (EST) shift the windows +1 hour (see DEPLOY.md).
on:
  schedule:
    - cron: "*/5 13-15 * * 1-5"   # ~09:00-11:55 ET  morning NY session (find setups)
    - cron: "*/5 17-20 * * 1-5"   # ~13:00-16:55 ET  afternoon NY session + end-of-day flatten
    - cron: "5 20 * * 1-5"        # ~16:05 ET        daily summary to Telegram
  workflow_dispatch:
    inputs:
      mode:
        description: "once | summary | healthcheck"
        default: "healthcheck"
        type: string

concurrency:
  group: tjr-bot
  cancel-in-progress: false        # never interrupt a run mid-order

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
      ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Daily summary
        if: ${{ github.event.schedule == '5 20 * * 1-5' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'summary') }}
        run: python scripts/run_bot.py --summary

      - name: Connectivity self-test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'healthcheck' }}
        run: python scripts/healthcheck.py

      - name: Trading cycle
        if: ${{ (github.event_name == 'schedule' && github.event.schedule != '5 20 * * 1-5') || (github.event_name == 'workflow_dispatch' && inputs.mode == 'once') }}
        run: python scripts/run_bot.py --once
