# ============================================================================
# Trading bot configuration — plain settings you can tweak by hand.
# ============================================================================

# Which market profile is active: "stocks" or "crypto" (see profiles: below)
active_profile: stocks

# ----- Risk management -----
# Fraction of the account to risk on a single trade. 0.01 = 1% (TJR's default).
# This is the REAL driver of position size: the bot buys exactly enough so that
# if the stop is hit, you lose this fraction of the account.
# (TJR's own default is ~1%; you chose 3%.)
risk_per_trade: 0.03

# Hard safety cap: force-exit a position if it loses this fraction of its value.
# This is your "keep 90%" rule (0.10 = never let one position lose >10% of what you put in).
# Set to null to disable and rely only on the structural stop.
max_position_loss_pct: 0.10

# How the stop is placed:
#   "fixed_pct"  -> stop sits max_position_loss_pct (10%) from entry  [your choice]
#   "structural" -> stop sits just beyond the swept high/low (tighter, TJR-style)
stop_mode: structural

# Daily kill-switch: stop trading for the day if either is hit.
daily_max_losses: 3          # number of losing trades (within a run)
daily_max_loss_pct: 0.05     # 5% of account down today -> NOW enforced across ALL scheduled runs (live account)
daily_max_trades: 4          # hard cap on new trades opened per day (across all runs)
max_concurrent_positions: 3  # never hold more than this many open positions at once
max_position_pct: 0.20       # a single position can never exceed this fraction of equity (gap/slippage guard)

# ----- Strategy (TJR / Smart-Money-Concepts) -----
strategy:
  pivot_strength: 2          # swing detection: 1 = aggressive, 3+ = conservative
  fvg_atr_mult: 0.25         # ignore fair-value-gaps smaller than 0.25 * ATR
  atr_period: 14
  confirm_window: 20         # bars allowed between sweep -> MSS -> entry FVG (was 10, too tight)
  min_rr: 3.0                # minimum reward:risk to take a trade (was 2.0, too close)
  max_trades_per_day: 3

# Trend/regime filter: block counter-trend trades only in strongly-trending (high-ADX) markets.
# Enabled 2026-06-12: today AAPL/MRVL vwap_rev losses were direct counter-trend trades
# (long into AAPL downtrend, short into MRVL uptrend). ADX filter + vwap_rev EMA filter
# together prevent repeating this. The backtest that justified "false" used old wrong signal
# params (confirm_window=10, min_rr=2.0) — now fixed, so re-evaluate filter benefit.
regime_filter: true

# ----- Multi-strategy: run these alongside TJR; each is tracked separately -----
# Backtest (45d, indicative): vwap_rev profitable (PF 1.24); orb lost (PF 0.91);
# tjr ~breakeven. So vwap_rev + tjr are ON; orb is OFF pending refinement.
strategies:
  tjr:      { enabled: true }                  # TJR / SMC (uses the `strategy:` params above)
  vwap_rev: { enabled: true, atr_mult: 2.5, min_bars_open: 6 }  # fade overstretched moves back to VWAP; 2.5x ATR threshold + skip first 30min
  # momentum: trend breakout (fast EMA>slow EMA + N-bar high break). 30d backtest
  # 2026-06-13: PF 1.58, +$4,638 / 167 trades — best edge of all four. Trend-gated.
  momentum: { enabled: true, ema_fast: 9, ema_slow: 21, lookback: 20, min_rr: 2.0 }
  orb:      { enabled: false, or_minutes: 15 } # opening-range breakout (OFF: lost in backtest)
  rsi_pullback: { enabled: false }             # Connors RSI(2) — 30d backtest PF 0.88 (loses), OFF
  # macd_trend: MACD(12,26,9) cross above/below signal, gated by zero line + trend EMA.
  # 30d backtest 2026-06-15: PF 2.76, +$2,078 / 66 trades — best PF of all. ON.
  macd_trend: { enabled: true, fast: 12, slow: 26, signal: 9, trend_ema: 50, min_rr: 2.0 }
  # squeeze_breakout: BB-inside-Keltner volatility squeeze release on a volume surge.
  # 30d backtest 2026-06-15: PF 1.69, +$444 / 22 trades. ON.
  squeeze_breakout: { enabled: true, bb_period: 20, kc_period: 20, vol_mult: 1.2, min_rr: 2.0 }
  # bollinger_rev: BB(20,2σ) mean-reversion + RSI. 30d backtest PF 1.00 (breakeven) — OFF
  # until it shows an edge; the nightly review can auto-enable it if PF>1.2.
  bollinger_rev: { enabled: false, period: 20, num_std: 2.0 }

# ----- Market profiles -----
profiles:
  stocks:
    symbols: [AAPL, MSFT, NVDA, TSLA, AMD, SPY, QQQ]   # always-watch list (kept even when screener is on)
    universe:               # "go find" stocks: auto-screen liquid movers each scan
      enabled: true
      max_symbols: 20       # how many screened names to scan (plus the watchlist)
      min_price: 5          # skip penny stocks
      max_price: 1000       # skip ultra-high-priced names
    timeframe: 5Min
    session: rth             # regular trading hours 09:30-16:00 ET
    # Liquidity levels swept during the stock session:
    levels: [prev_day_high, prev_day_low, opening_range_high, opening_range_low]
    opening_range_minutes: 30

  crypto:
    symbols: ["BTC/USD", "ETH/USD"]
    timeframe: 15Min
    session: "24/7"
    # TJR-native: sweep the overnight / Asia-session range.
    levels: [asia_high, asia_low, prev_day_high, prev_day_low]
    asia_session: { start: "20:00", end: "00:00", tz: "America/New_York" }
