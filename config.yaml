# ============================================================================
# Trading bot configuration — plain settings you can tweak by hand.
# ============================================================================

# Which market profile is active: "stocks" or "crypto" (see profiles: below)
active_profile: stocks

# ----- Risk management -----
# Fraction of the account to risk on a single trade. 0.01 = 1% (TJR's default).
# This is the REAL driver of position size: the bot buys exactly enough so that
# if the stop is hit, you lose this fraction of the account.
# (TJR's own default is ~1%; you chose 3%.)
risk_per_trade: 0.03

# Hard safety cap: force-exit a position if it loses this fraction of its value.
# This is your "keep 90%" rule (0.10 = never let one position lose >10% of what you put in).
# Set to null to disable and rely only on the structural stop.
max_position_loss_pct: 0.10

# How the stop is placed:
#   "fixed_pct"  -> stop sits max_position_loss_pct (10%) from entry  [your choice]
#   "structural" -> stop sits just beyond the swept high/low (tighter, TJR-style)
stop_mode: structural

# Minimum stop distance as a fraction of entry. A structural stop closer than this is
# widened to the floor (target keeps the same R:R). 2026-07-01: raised 0.5% -> 1.5%.
# Live data showed STOP exits won 0% of the time — 0.5% stops were still inside 5-min
# noise and got picked off before the trade could work. Floor sweep (45d backtest):
# 1.5% lifts win rate to tjr 51% / momentum 57% / macd_trend 55% (from ~43%) while
# keeping PF ~1.4-1.6. Wider stops let winners breathe; this is the main win-rate fix.
min_stop_pct: 0.015

# How many recently-closed bars a signal may be old and still tradeable. 2026-07-19:
# raised 3 -> 6. At 3 (≈15 min) the bot matched almost no signals live (5-min scans +
# feed lag put the signal bar 4-8 bars behind "now") and placed ~0 trades for 12 days.
# 6 (≈30 min) recovers the full actionable signal set while staying near real time.
fresh_bars: 6

# Partial take-profit (split each entry into a 1R half + full-target half). OFF: the
# two halves share one stop, so a stop-out loses both fully while a win caps the first
# half — strictly worse than a single bracket, and no backtest benefit. See engine.py.
partial_tp: false

# Daily kill-switch: stop trading for the day if either is hit.
daily_max_losses: 3          # number of losing trades (within a run)
daily_max_loss_pct: 0.05     # 5% of account down today -> NOW enforced across ALL scheduled runs (live account)
daily_max_trades: 4          # hard cap on new trades opened per day (across all runs)
max_concurrent_positions: 3  # never hold more than this many open positions at once
max_position_pct: 0.20       # a single position can never exceed this fraction of equity (gap/slippage guard)

# ----- Strategy (TJR / Smart-Money-Concepts) -----
strategy:
  pivot_strength: 2          # swing detection: 1 = aggressive, 3+ = conservative
  fvg_atr_mult: 0.25         # ignore fair-value-gaps smaller than 0.25 * ATR
  atr_period: 14
  confirm_window: 20         # bars allowed between sweep -> MSS -> entry FVG (was 10, too tight)
  min_rr: 3.0                # minimum reward:risk to take a trade (was 2.0, too close)
  max_trades_per_day: 3

# Trend/regime filter: block counter-trend trades only in strongly-trending (high-ADX) markets.
# Enabled 2026-06-12: today AAPL/MRVL vwap_rev losses were direct counter-trend trades
# (long into AAPL downtrend, short into MRVL uptrend). ADX filter + vwap_rev EMA filter
# together prevent repeating this. The backtest that justified "false" used old wrong signal
# params (confirm_window=10, min_rr=2.0) — now fixed, so re-evaluate filter benefit.
regime_filter: true

# Market-breadth filter: block individual-name shorts on a clearly risk-on day and
# longs on a clearly risk-off day, judged by SPY's session direction. Added 2026-06-18
# after the bot shorted TSLA/MSFT into a broad green day (every stock +0.3%..+2.1%) and
# got run over for ~$770. Index-level guard on top of the per-symbol regime filter.
market_filter: true
# How big a SPY move (% from the open) counts as a clear up/down day. 2026-07-01:
# tightened 0.40 -> 0.25. On 06-29 SPY was only +0.10-0.31% through the morning, so the
# filter read "neutral" and let MRVL/INTC shorts through (-$1,463) even though the tape
# was up. A 0.25% threshold catches those earlier. Backtest: 55%->57% win, +$7.9k->$9.8k.
market_bias_min_pct: 0.25

# News gate (2026-07-08, user directive "go off the news every morning"): symbols with
# an Alpaca/Benzinga headline in the last lookback_hours get their MEAN-REVERSION
# signals dropped — news moves trend, and fading a news move is how reversion gets run
# over. Trend/momentum (APEX) still trades them. Fail-open on API errors. The morning
# Telegram digest is scripts/morning_brief.py (CI mode "morning-brief").
news_filter:
  enabled: true
  lookback_hours: 18
  block_bots: [riptide]

# ----- Virtual bots (2026-07-08) -----
# Two ensembles trade side by side in this one paper account, tracked by order-tag
# prefix (apx-/rip-). LEARNING PHASE by user directive: many trades at LOW per-trade
# risk (1% / 0.8% vs the old 3%) so per-strategy stats accumulate fast. The account
# kill switch is UNCHANGED: daily_max_loss_pct 5% halts everything, positions stay
# bracketed, max_concurrent_positions/max_position_pct untouched. Per-bot envelopes
# below are sub-limits so one bot can't spend the whole day's risk budget.
# honor_signal_target: keep each strategy's own target instead of rewriting to
# min_rr*risk (the July root cause: reversion targets were forced 3R away).
bots:
  apex:     # trend/momentum ensemble — rides moves WITH the tape
    prefix: apx
    risk_per_trade: 0.010
    daily_max_trades: 8
    daily_max_losses: 4
    daily_max_loss_pct: 0.025
    min_stop_pct: 0.008
    honor_signal_target: true
  riptide:  # mean-reversion ensemble — fades stretches back to anchors
    prefix: rip
    risk_per_trade: 0.008
    daily_max_trades: 10
    daily_max_losses: 4
    daily_max_loss_pct: 0.025
    min_stop_pct: 0.004
    honor_signal_target: true

# ----- Strategies (each assigned to a bot via `bot:`; unassigned = legacy "bot-") -----
strategies:
  # tjr OFF 2026-07-07: live PF 0.59 over 19 trades (14d), −$3.8k all-time. Shorts alone
  # lost ~$1.8k into rising tape (06-29, 07-01, 07-07 AVGO −$472); longs broke even.
  # Long-only variant backtested WORSE (PF 0.38, 60d) — full disable per ≥20-trades PF<0.9 rule.
  # Root cause (07-08 deep-dive): sweep→MSS→FVG entries are inherently counter-trend, and
  # min_rr 3.0 × the 1.5% stop floor put targets ≥4.5% away intraday = unreachable.
  tjr:      { enabled: false }                 # TJR / SMC (uses the `strategy:` params above)

  # --- APEX (trend/momentum) ---
  # momentum: trend breakout (fast EMA>slow EMA + N-bar high break). 30d backtest
  # 2026-06-13: PF 1.58, +$4,638 / 167 trades. Live 20t PF 1.01 under the old 3R-rewrite
  # sizing; moves to APEX where its own 2R targets are honored.
  # adx_min 20->30 (2026-07-14): live PF 0.53 over 8 trades came from choppy breakouts
  # (PLTR/AVGO/EWY/MU longs that reversed on entry). 60d/10-sym backtest: adx_min 30 lifts
  # PF 1.25->1.33, win 54%->55% over 207 trades (>150 sample) — a tightening, per the
  # strategy's own "breakouts only work when ADX confirms trend" thesis. One change this run.
  # DID NOT WORK: live went 0-for-11 / -$1,743 in the 3 trading days right after (07-14
  # ..07-17), on top of -$65 before it — total live PF ~0 over 17 trades post-fix and
  # pre-fix combined. CI already disabled it here (07-17 auto-tune commit 63bc3d6).
  # Root cause is structural, not a parameter: entry/stop/target are all computed off
  # the signal bar's close on 15-min-delayed IEX data (see alpaca_exec.py
  # ENTRY_SLIPPAGE_CAP), then filled minutes later as a marketable limit. Breakout/
  # momentum entries are the most latency-sensitive signal type there is — by the time
  # the fill lands, the move the breakout was chasing has typically already extended
  # and started reverting, so the position opens near the local top/bottom regardless
  # of ADX. Mean-reversion strategies (vwap_rev, band_tag) don't have this problem —
  # fading INTO the delay helps them. Stays OFF pending a resting-stop-entry rewrite
  # (like noise_band's design) that fills at the live breakout level instead of the
  # stale signal price — real order-lifecycle surface area, not an unattended change.
  momentum: { enabled: false, bot: apex, ema_fast: 9, ema_slow: 21, lookback: 20, min_rr: 2.0, adx_min: 30 }
  # macd_trend: MACD(12,26,9) cross gated by zero line + trend EMA.
  # DISABLED 2026-07-21 (audit): 60d full-matrix backtest PF 1.12 (marginal, well below
  # the ~1.2 keep bar), live 6 trades / 33% / -$220. It's a market-entry breakout, so it
  # carries the same 15-min-delay fill decay that killed momentum (entry computed off a
  # stale signal bar). Weak edge + known structural latency flaw = cut.
  macd_trend: { enabled: false, bot: apex, fast: 12, slow: 26, signal: 9, trend_ema: 50, min_rr: 2.0, adx_min: 20 }
  # squeeze_breakout: BB-inside-Keltner squeeze release on volume.
  # DISABLED 2026-07-21 (audit): 60d full-matrix backtest PF 0.80 (LOSING), exp -$10/trade
  # over 37 trades. Live is +$213 over just 5 trades — too small a sample to override a
  # losing backtest on a strategy with a negative expectancy. Also a market-entry breakout
  # (same latency flaw). Cut; the nightly review can re-enable if a backtest clears PF>=1.2.
  squeeze_breakout: { enabled: false, bot: apex, bb_period: 20, kc_period: 20, vol_mult: 1.2, min_rr: 2.0 }
  # noise_band (NEW 07-08): Zarattini-style intraday momentum — break of the average
  # time-of-day move-from-open envelope, VWAP-aligned. Precomputed levels tolerate the
  # 15-min IEX delay. Published evidence class: Concretum "Beat the Market" (SPY).
  noise_band: { enabled: false, bot: apex, lookback_days: 14, band_k: 1.0, stop_atr: 1.5, rr: 2.0 }

  # --- RIPTIDE (mean reversion) ---
  # vwap_rev: fade overstretched moves back to VWAP. Moves to RIPTIDE where its VWAP
  # target is honored (was being rewritten to 3R — the July bleed).
  vwap_rev: { enabled: true, bot: riptide, atr_mult: 2.5, min_bars_open: 6 }
  # gap_fade (NEW 07-08): fade small (0.1-0.4%) index-ETF opening gaps toward prior close.
  # OFF at launch: 60d backtest PF 0.51 over only 9 trades (small sample, but losing).
  # Dormant until a backtest shows PF>=1.2 — the nightly review can then enable it.
  gap_fade: { enabled: false, bot: riptide, min_gap: 0.001, max_gap: 0.004, stop_atr: 2.0 }
  # band_tag (NEW 07-08): Keltner 2.5xATR band tag + RSI(2) extreme, daily SMA10 trend
  # gate (Connors-style: only fade WITH the higher-timeframe trend). Target = band mid.
  band_tag: { enabled: true, bot: riptide, kc_mult: 2.5, rsi_lo: 5, rsi_hi: 95, stop_atr: 1.2, sma_days: 10 }

  # confluence (NEW 2026-07-21): the "merged" strategy, built from the fundamentals of the
  # three strategies that survived the audit (vwap_rev + band_tag + orb) plus VWAP-reversion
  # web research. Fades the ±1.5-SD VWAP band ONLY when 4 edges align: (1) volume-weighted
  # SD stretch from VWAP, (2) RSI(14) extreme, (3) daily-trend gate (fade WITH the higher-tf
  # trend, Connors-style), (4) above-avg volume — plus session-timing (skip open + midday
  # lull). Entry is a LIMIT retrace (band_tag's latency-safe fill), so it's immune to the
  # 15-min IEX delay that killed the market-entry breakouts. Target = VWAP, stop = 2 SD.
  # Tuned + OUT-OF-SAMPLE validated (60d, regime on): PF 2.76 / 57% win over 16 test
  # symbols, PF 2.23 on 8 symbols never used in tuning, PF 1.31 stretched over 28 symbols.
  # Regime-dependent (PF ~1.11 with the filter off) — expected for a fade; the daily gate +
  # engine regime filter are load-bearing. A stop-geometry guard (only take the trade when
  # the -stop band sits below entry and VWAP above it) rejects the incoherent early-session
  # setups that inflated an initial sweep. SELECTIVE by design (~14 trades/60d/16 syms) —
  # it waits for real 4-way confluence, so it won't trade often. Watch its first 20 LIVE
  # trades before trusting fully: the backtest fills a limit on a retrace, and live data
  # lag can miss a fill the backtest assumes; if live fill rate is poor, revisit.
  confluence: { enabled: true, bot: riptide, band_sigma: 1.5, stop_sigma: 2.0, rsi_period: 14, rsi_lo: 30, rsi_hi: 70, sma_days: 10 }

  # orb: opening-range breakout, gated by VWAP side. The "lost in backtest" comment
  # this carried was stale — every compare_strategies.py run on record shows it
  # profitable (60d: PF 1.06 on 07-07, 1.08 on 07-09, 1.16/+$3,887/224t on 07-20),
  # consistent across multiple independent windows and >150 trades. Moved to APEX
  # (trend/momentum family) since it's a same-direction breakout, not a fade.
  # Re-enabled 2026-07-20. Watch first 20 live trades before trusting it fully —
  # same market-entry-off-delayed-signal-bar mechanism that hurt momentum (see that
  # entry's note); ORB's single-shot-per-day-off-a-fixed-range structure is less
  # exposed to that than momentum's rolling 20-bar breakout, but it is not immune.
  orb:      { enabled: true, bot: apex, or_minutes: 15 }
  rsi_pullback: { enabled: false }             # Connors RSI(2) — 30d backtest PF 0.88 (loses), OFF
  # bollinger_rev: BB(20,2σ) mean-reversion + RSI. 30d backtest PF 1.00 (breakeven) — OFF
  # until it shows an edge; the nightly review can auto-enable it if PF>1.2.
  bollinger_rev: { enabled: false, period: 20, num_std: 2.0 }

# ----- Market profiles -----
profiles:
  stocks:
    # always-watch list (kept even when screener is on). IWM/DIA added 07-08 for
    # RIPTIDE's gap_fade (index ETFs gap-fill most reliably).
    symbols: [AAPL, MSFT, NVDA, TSLA, AMD, SPY, QQQ, IWM, DIA]
    universe:               # "go find" stocks: auto-screen liquid movers each scan
      enabled: true
      max_symbols: 20       # how many screened names to scan (plus the watchlist)
      min_price: 5          # skip penny stocks
      max_price: 1000       # skip ultra-high-priced names
    timeframe: 5Min
    session: rth             # regular trading hours 09:30-16:00 ET
    # Liquidity levels swept during the stock session:
    levels: [prev_day_high, prev_day_low, opening_range_high, opening_range_low]
    opening_range_minutes: 30

  crypto:
    symbols: ["BTC/USD", "ETH/USD"]
    timeframe: 15Min
    session: "24/7"
    # TJR-native: sweep the overnight / Asia-session range.
    levels: [asia_high, asia_low, prev_day_high, prev_day_low]
    asia_session: { start: "20:00", end: "00:00", tz: "America/New_York" }
